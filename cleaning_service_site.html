      radial-gradient(ellipse 1400px 900px at 110% 110%, rgba(26,58,46,0.09) 0%, transparent 55%),

  input:focus { outline: none; box-shadow: inset 0 0 0 2px #14241c; }

  .grain-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.55;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320' viewBox='0 0 320 320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.16  0 0 0 0 0.12  0 0 0 0.80 0'/></filter><rect width='320' height='320' filter='url(%23n)'/></svg>");
    background-repeat: repeat;
    background-size: 320px 320px;
  }
  .grain-layer-fine {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.50;

    background-size: 180px 180px;

    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.2rem; letter-spacing: -0.01em;
    color: #14241c; opacity: 0.5; z-index: 0;
  }
  /* Ensure all content sits above the texture layers */
  #root > * { position: relative; z-index: 2; }
</style>

/* =========================================================
   NAV
   ========================================================= */
function Nav({ onBook, page, go }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const links = [
    { id: 'services', label: 'Services' },
    { id: 'cleaners', label: 'Our Cleaners' },
    { id: 'promise',  label: 'Promise' },
    { id: 'reviews',  label: 'Reviews' },
  ];
  return (
    <nav className={`fixed top-0 inset-x-0 z-40 transition-all duration-500 ${scrolled ? 'py-3 backdrop-blur-md' : 'py-6'}`}
         style={{ backgroundColor: scrolled ? 'rgba(242,237,227,0.85)' : 'transparent',
                  borderBottom: scrolled ? `1px solid ${COLORS.line}` : '1px solid transparent' }}>
      <div className="max-w-7xl mx-auto px-6 md:px-10 flex items-center justify-between">
        <button onClick={() => go('home')} className="flex items-center gap-2 cursor-pointer">

            <div style={{ fontFamily: 'Manrope, sans-serif' }} className="text-[10px] uppercase tracking-[0.2em] opacity-60">
              Trusted Cleaning Co.
            </div>
          </div>
        </button>
        <div className="hidden md:flex items-center gap-8 text-sm" style={{ fontFamily: 'Manrope, sans-serif' }}>
          {links.map(l => {
            const active = page === l.id;
            return (
              <button key={l.id}
                      onClick={() => go(l.id)}
                      className="relative hover:opacity-60 transition"
                      style={{ opacity: active ? 1 : 0.85 }}>
                {l.label}
                {active && (
                  <span className="absolute -bottom-1.5 left-0 right-0 h-px"
                        style={{ backgroundColor: COLORS.terra }} />

              </button>

                style={{ backgroundColor: COLORS.terraDeep }} />

/* =========================================================
   BOOKING MODAL
   ========================================================= */
function BookingModal({ open, onClose }) {
  const [step, setStep] = useState(0);
  const [state, setState] = useState({
    serviceType: 'home', packageId: 'deep', addons: [],
    date: null, timeWindow: null,
    subscription: null, discountOffered: false, discountAccepted: false,
    contact: { name: '', phone: '', email: '' },
    address: { street: '', unit: '', city: '', state: 'MD', zip: '' },
    notes: '',
    card: { number: '', exp: '', cvc: '', name: '', zip: '' },
  });
  const [processing, setProcessing] = useState(false);

  useEffect(() => {
    if (open) {
      setStep(0);
      setProcessing(false);
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  const pkg = useMemo(() =>
    PACKAGES[state.serviceType].find(p => p.id === state.packageId) || PACKAGES[state.serviceType][1]
  , [state.serviceType, state.packageId]);

  const pricing = useMemo(() => {
    const base = pkg.price;
    const addons = state.addons.reduce((s, id) => s + (ADDONS.find(a => a.id === id)?.price || 0), 0);
    const subtotal = base + addons;
    let discount = 0;
    if (state.subscription) {
      const s = SUBSCRIPTIONS.find(x => x.id === state.subscription);
      if (s) discount = (subtotal * s.discount) / 100;
    } else if (state.discountAccepted) {
      discount = subtotal * 0.10;
    }
    const tax = (subtotal - discount) * 0.06;
    const total = subtotal - discount + tax;
    return { base, addons, subtotal, discount, tax, total };
  }, [pkg, state.addons, state.subscription, state.discountAccepted]);

  const update = (partial) => setState(s => ({ ...s, ...partial }));
  if (!open) return null;

  const steps = [
    { n: 0, label: 'Service' },
    { n: 1, label: 'Date & Time' },
    { n: 2, label: 'Recurring' },
    { n: 3, label: 'Details' },
    { n: 4, label: 'Payment' },
    { n: 5, label: 'Confirmed' },
  ];

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto" style={{ backgroundColor: COLORS.bg }}>
      <div className="sticky top-0 z-10 border-b" style={{ borderColor: COLORS.line, backgroundColor: COLORS.bg }}>
        <div className="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full flex items-center justify-center" style={{ backgroundColor: COLORS.forest }}>
              <Feather size={14} color={COLORS.bg}/>
            </div>
            <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 500 }} className="text-lg">
              Book your cleaning
            </div>
          </div>
          <button onClick={onClose}
                  className="w-10 h-10 flex items-center justify-center hover:opacity-60 transition"
                  style={{ border: `1px solid ${COLORS.ink}` }}>
            <X size={18}/>
          </button>
        </div>
        <div className="max-w-6xl mx-auto px-6 pb-5">
          <div className="flex items-center gap-2 overflow-x-auto">
            {steps.map((s, i) => (
              <div key={i} className="flex items-center gap-2 flex-shrink-0">
                <div className={`flex items-center gap-2 transition-opacity ${step >= i ? 'opacity-100' : 'opacity-40'}`}>
                  <div className="w-6 h-6 rounded-full flex items-center justify-center text-[10px]"
                       style={{ backgroundColor: step >= i ? COLORS.ink : 'transparent',
                                color: step >= i ? COLORS.bg : COLORS.ink,
                                border: `1px solid ${COLORS.ink}`,
                                fontFamily: 'Manrope, sans-serif' }}>
                    {step > i ? <Check size={12}/> : i + 1}
                  </div>
                  <span className="text-xs uppercase tracking-widest hidden sm:inline" style={{ fontFamily: 'Manrope, sans-serif' }}>
                    {s.label}
                  </span>
                </div>
                {i < steps.length - 1 && (
                  <div className="w-6 md:w-12 h-px" style={{ backgroundColor: COLORS.ink, opacity: step > i ? 1 : 0.2 }}/>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-6 py-10 md:py-14 pb-32">
        {step === 0 && <StepService state={state} update={update}/>}
        {step === 1 && <StepDateTime state={state} update={update}/>}
        {step === 2 && <StepSubscription state={state} update={update} setStep={setStep}/>}
        {step === 3 && <StepDetails state={state} update={update}/>}
        {step === 4 && <StepPayment state={state} update={update} pricing={pricing} pkg={pkg}
                                    processing={processing} setProcessing={setProcessing}
                                    onComplete={() => setStep(5)}/>}
        {step === 5 && <StepConfirmation state={state} pricing={pricing} pkg={pkg} onClose={onClose}/>}
      </div>

      {step < 5 && step !== 4 && (
        <div className="fixed bottom-0 inset-x-0 border-t" style={{ borderColor: COLORS.line, backgroundColor: COLORS.bg }}>
          <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div className="flex items-center gap-6">
              {step > 0 && (
                <button onClick={() => setStep(step - 1)}
                        className="flex items-center gap-2 text-sm hover:opacity-60 transition"
                        style={{ fontFamily: 'Manrope, sans-serif' }}>
                  <ChevronLeft size={16}/> Back
                </button>
              )}
              <div className="hidden md:flex items-baseline gap-2" style={{ fontFamily: 'Manrope, sans-serif' }}>
                <span className="text-xs uppercase tracking-widest opacity-60">Running total</span>
                <span style={{ fontFamily: 'Fraunces, serif' }} className="text-xl">${pricing.total.toFixed(2)}</span>
              </div>
            </div>
            <button onClick={() => setStep(step + 1)}
                    disabled={
                      (step === 1 && (!state.date || !state.timeWindow)) ||
                      (step === 3 && (!state.contact.name || !state.contact.email || !state.contact.phone || !state.address.street || !state.address.city || !state.address.zip))
                    }
                    className="flex items-center gap-2 px-8 py-4 text-sm font-medium transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                    style={{ backgroundColor: COLORS.ink, color: COLORS.bg,
                             fontFamily: 'Manrope, sans-serif', letterSpacing: '0.05em' }}>
              {step === 3 ? 'TO PAYMENT' : 'CONTINUE'}
              <ArrowRight size={14}/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- Step 1 ---- */
function StepDateTime({ state, update }) {
  const days = useMemo(() => {
    const arr = [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let i = 1; i <= 21; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      arr.push(d);
    }
    return arr;
  }, []);
  const fmtDay = d => d.toLocaleDateString('en-US', { weekday: 'short' });
  const fmtDate = d => d.getDate();
  const fmtMonth = d => d.toLocaleDateString('en-US', { month: 'short' });
  const isoDate = d => d.toISOString().split('T')[0];

  return (
    <div>
      <StepHeader num={2} title="When should we arrive?" sub="Pick any available date in the next 3 weeks and a 2-hour arrival window. Need sooner? Call us — we often squeeze in next-day jobs."/>
      <div className="mb-10">
        <Label>Choose a date</Label>
        <div className="grid grid-cols-4 sm:grid-cols-7 gap-2 max-w-4xl">
          {days.map((d, i) => {
            const iso = isoDate(d);
            const active = state.date === iso;
            return (
              <button key={i}
                      onClick={() => update({ date: iso })}
                      className="p-3 text-center transition-all"
                      style={{ border: `1px solid ${active ? COLORS.ink : COLORS.line}`,
                               backgroundColor: active ? COLORS.ink : COLORS.paper,
                               color: active ? COLORS.bg : COLORS.ink }}>
                <div className="text-[10px] uppercase tracking-widest opacity-70" style={{ fontFamily: 'Manrope, sans-serif' }}>
                  {fmtDay(d)}
                </div>
                <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 400 }} className="text-2xl leading-none my-1">
                  {fmtDate(d)}
                </div>
                <div className="text-[10px] uppercase tracking-widest opacity-70" style={{ fontFamily: 'Manrope, sans-serif' }}>
                  {fmtMonth(d)}
                </div>
              </button>
            );
          })}
        </div>
      </div>
      {state.date && (
        <div>
          <Label>Choose your 2-hour arrival window</Label>
          <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-3 max-w-3xl">
            {TIME_WINDOWS.map(w => {
              const active = state.timeWindow === w.id;
              return (
                <button key={w.id}
                        onClick={() => update({ timeWindow: w.id })}
                        className="flex items-center justify-between p-4 transition-all"
                        style={{ border: `1px solid ${active ? COLORS.ink : COLORS.line}`,
                                 backgroundColor: active ? COLORS.ink : COLORS.paper,
                                 color: active ? COLORS.bg : COLORS.ink }}>
                  <div className="flex items-center gap-3">
                    <Clock size={16}/>
                    <span style={{ fontFamily: 'Manrope, sans-serif' }}>{w.label}</span>
                  </div>
                  {active && <Check size={16}/>}
                </button>
              );
            })}
          </div>
          <p className="mt-4 text-xs opacity-60 max-w-xl" style={{ fontFamily: 'Manrope, sans-serif' }}>
            Your team will text you 30 minutes before arrival with ETA, photos, and brief bios.
          </p>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   MAIN APP  (with simple hash routing)
   ========================================================= */
const ROUTES = ['home', 'services', 'cleaners', 'promise', 'reviews'];

function CleaningServiceSite() {
  const [booking, setBooking] = useState(false);
  const [page, setPage] = useState(() => {
    const hash = window.location.hash.replace('#', '');
    return ROUTES.includes(hash) ? hash : 'home';
  });

  const go = (p) => {
    if (!ROUTES.includes(p)) p = 'home';
    window.location.hash = p === 'home' ? '' : p;
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  useEffect(() => {
    const handler = () => {
      const hash = window.location.hash.replace('#', '');
      setPage(ROUTES.includes(hash) ? hash : 'home');
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // Remove the initial loading placeholder the moment React takes over
  useEffect(() => {
    const boot = document.getElementById('boot');
    if (boot) boot.remove();
  }, []);

  const openBooking = () => setBooking(true);

  const renderPage = () => {
    switch (page) {
      case 'services': return <ServicesPage onBook={openBooking} go={go}/>;
      case 'cleaners': return <CleanersPage onBook={openBooking} go={go}/>;
      case 'promise':  return <PromisePage  onBook={openBooking} go={go}/>;
      case 'reviews':  return <ReviewsPage  onBook={openBooking} go={go}/>;
      default:
        return (
          <>
            <Hero onBook={openBooking} go={go}/>
            <TrustBar/>
            <Services onBook={openBooking}/>
            <VettingSection/>
            <FearsSection/>
            <Testimonials/>
            <FinalCTA onBook={openBooking}/>
          </>
        );
    }
  };

  return (
    <div className="relative min-h-screen" style={{ color: COLORS.ink }}>
      <GrainOverlay/>
      <Nav onBook={openBooking} page={page} go={go}/>
      <main>{renderPage()}</main>
      <Footer/>
      <BookingModal open={booking} onClose={() => setBooking(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CleaningServiceSite/>);
</script>
